seed: 42
runtime:
  device: mps
  cpu_threads: 18
data:
  split_csv: metadata/splits_duplicate_aware.csv
  image_size: 224
training:
  batch_size: 64
  num_workers: 8
  epochs: 30
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
model:
  backbone: resnet18
  checkpoint: runs/simclr_smoke/encoder_last.pt
  freeze_encoder: false

